upstream sistema_encomiendas {
    server web:8000;
}

server {
    listen 80;

    location / {
        proxy_pass http://sistema_encomiendas;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Para los archivos CSS y JS que configuramos antes
    location /static/ {
        alias /app/static/;
    }
}